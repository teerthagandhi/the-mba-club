<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum — The MBA Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
    }

    nav {
      border-bottom: 0.5px solid #e0e0e0;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-weight: 900;
      font-size: 16px;
      text-decoration: none;
      color: #000;
      letter-spacing: -0.5px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn-small {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      border: 0.5px solid #000;
      background: transparent;
      color: #000;
    }

    .btn-small.filled {
      background: #6B1F1F;
      color: #fff;
      border-color: #6B1F1F;
    }

    .btn-small:hover { opacity: 0.7; }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 3rem;
    }

    /* SIDEBAR */
    .sidebar-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 0.5rem;
      padding: 0 6px;
    }

    .category-group {
      margin-bottom: 1.5rem;
    }

    .category-group-title {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 8px;
      margin-bottom: 2px;
    }

    .category-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .category-list li a {
      display: block;
      font-size: 13px;
      color: #444;
      text-decoration: none;
      padding: 5px 8px;
      border-radius: 5px;
      transition: background 0.1s;
    }

    .category-list li a:hover { background: #f5f5f5; }
    .category-list li a.active { background: #6B1F1F; color: #fff; }

    .all-link {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #000;
      text-decoration: none;
      padding: 5px 8px;
      border-radius: 5px;
      margin-bottom: 1.5rem;
    }

    .all-link:hover { background: #f5f5f5; }
    .all-link.active { background: #6B1F1F; color: #fff; }

    /* MAIN */
    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .main-header h2 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .post-list {
      display: flex;
      flex-direction: column;
    }

    .post-item {
      border-top: 0.5px solid #e0e0e0;
      padding: 1.2rem 0;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .post-item:last-child { border-bottom: 0.5px solid #e0e0e0; }
    .post-item:hover .post-title { color: #6B1F1F; }

    .post-meta {
      font-size: 11px;
      color: #999;
      margin-bottom: 5px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .post-category-tag {
      background: #fdf0f0;
      color: #6B1F1F;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
    }

    .post-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
      transition: color 0.15s;
    }

    .post-body-preview {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .post-footer {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .reply-count {
      font-size: 11px;
      color: #bbb;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 0;
      color: #999;
      font-size: 14px;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.3px;
    }

    .modal input,
    .modal textarea,
    .modal select {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      border: 0.5px solid #ccc;
      border-radius: 6px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      color: #000;
    }

    .modal textarea { min-height: 120px; resize: vertical; }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #6B1F1F; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* DROPDOWN */
    .profile-menu { position: relative; }

    .profile-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      background: #fff;
      border: 0.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.5rem;
      min-width: 180px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      z-index: 100;
    }

    .dropdown-email {
      font-size: 11px;
      color: #999;
      padding: 6px 10px;
      border-bottom: 0.5px solid #f0f0f0;
      margin-bottom: 4px;
    }

    .dropdown-item {
      display: block;
      width: 100%;
      text-align: left;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #000;
      text-decoration: none;
      background: transparent;
      border: none;
      padding: 7px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .dropdown-item:hover { background: #f5f5f5; }
    .hidden { display: none; }

    /* MODAL CATEGORY SELECT */
    .modal-select-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">The MBA Club</a>
  <div class="nav-right">
    <button class="btn-small filled" onclick="openModal()">+ New Post</button>
    <div id="nav-auth">
      <a href="login.html" class="btn-small">Log in</a>
    </div>
  </div>
</nav>

<div class="container">
  <aside class="sidebar">
    <a href="#" class="all-link active" id="all-link" onclick="filterCategory(null, this)">All Discussions</a>
    <div id="category-sidebar"></div>
  </aside>

  <main>
    <div class="main-header">
      <h2 id="current-category">All Discussions</h2>
    </div>
    <div class="post-list" id="post-list">
      <div class="empty-state">Loading...</div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>New Post</h3>
    <div class="modal-select-group">
      <select id="post-parent-category" onchange="filterSubcategories()">
        <option value="">Topic area</option>
      </select>
      <select id="post-category">
        <option value="">Subcategory</option>
      </select>
    </div>
    <input type="text" id="post-title" placeholder="Title" />
    <textarea id="post-body" placeholder="What's on your mind?"></textarea>
    <div class="modal-actions">
      <button class="btn-small" onclick="closeModal()">Cancel</button>
      <button class="btn-small filled" onclick="submitPost()">Post</button>
    </div>
  </div>
</div>

<script>
  let currentUser = null
  let currentCategoryId = null
  let allCategories = []

  async function initAuth() {
    const { data: { session } } = await db.auth.getSession()
    if (session) {
      currentUser = session.user
      document.getElementById('nav-auth').innerHTML = `
        <div class="profile-menu">
          <button class="btn-small" onclick="toggleProfileMenu()">Profile</button>
          <div class="profile-dropdown hidden" id="profile-dropdown">
            <div class="dropdown-email">${session.user.email}</div>
            <a href="profile.html" class="dropdown-item">My profile</a>
            <button class="dropdown-item" onclick="logout()">Log out</button>
          </div>
        </div>
      `
    }
  }

  async function logout() {
    await db.auth.signOut()
    window.location.reload()
  }

  function toggleProfileMenu() {
    document.getElementById('profile-dropdown').classList.toggle('hidden')
  }

  async function loadCategories() {
    const { data } = await db.from('categories').select('*').order('id')
    allCategories = data || []

    const parents = allCategories.filter(c => !c.parent_id)
    const sidebar = document.getElementById('category-sidebar')
    const parentSelect = document.getElementById('post-parent-category')

    parents.forEach(parent => {
      const children = allCategories.filter(c => c.parent_id === parent.id)

      // Sidebar group
      const group = document.createElement('div')
      group.className = 'category-group'
      group.innerHTML = `<div class="category-group-title">${parent.name}</div>`
      const ul = document.createElement('ul')
      ul.className = 'category-list'

      children.forEach(child => {
        const li = document.createElement('li')
        li.innerHTML = `<a href="#" onclick="filterCategory(${child.id}, this)">${child.name}</a>`
        ul.appendChild(li)
      })

      group.appendChild(ul)
      sidebar.appendChild(group)

      // Modal parent select
      const opt = document.createElement('option')
      opt.value = parent.id
      opt.textContent = parent.name
      parentSelect.appendChild(opt)
    })
  }

  function filterSubcategories() {
    const parentId = parseInt(document.getElementById('post-parent-category').value)
    const subSelect = document.getElementById('post-category')
    subSelect.innerHTML = '<option value="">Subcategory</option>'

    const children = allCategories.filter(c => c.parent_id === parentId)
    children.forEach(child => {
      const opt = document.createElement('option')
      opt.value = child.id
      opt.textContent = child.name
      subSelect.appendChild(opt)
    })
  }

  async function loadPosts(categoryId = null) {
    let query = db
      .from('posts')
      .select('*, profiles(username), categories(name, parent_id)')
      .order('created_at', { ascending: false })

    if (categoryId) {
      query = query.eq('category_id', categoryId)
    }

    const { data } = await query
    const list = document.getElementById('post-list')

    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty-state">No posts yet. Be the first to post.</div>'
      return
    }

    // Get reply counts
    const postIds = data.map(p => p.id)
    const { data: replyCounts } = await db
      .from('replies')
      .select('post_id')
      .in('post_id', postIds)

    const countMap = {}
    replyCounts?.forEach(r => {
      countMap[r.post_id] = (countMap[r.post_id] || 0) + 1
    })

    list.innerHTML = data.map(post => `
      <a class="post-item" href="post.html?id=${post.id}">
        <div class="post-meta">
          <span class="post-category-tag">${post.categories?.name || ''}</span>
          <span>${post.profiles?.username || 'Anonymous'}</span>
          <span>·</span>
          <span>${timeAgo(post.created_at)}</span>
        </div>
        <div class="post-title">${post.title}</div>
        <div class="post-body-preview">${post.body}</div>
        <div class="post-footer">
          <span class="reply-count">↩ ${countMap[post.id] || 0} ${countMap[post.id] === 1 ? 'reply' : 'replies'}</span>
        </div>
      </a>
    `).join('')
  }

  function filterCategory(id, el) {
    document.querySelectorAll('.category-list a, .all-link').forEach(a => a.classList.remove('active'))
    el.classList.add('active')
    currentCategoryId = id
    document.getElementById('current-category').textContent = id ? el.textContent : 'All Discussions'
    loadPosts(id)
  }

  function openModal() {
    if (!currentUser) { window.location.href = 'login.html'; return; }
    document.getElementById('modal').classList.add('open')
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open')
    document.getElementById('post-title').value = ''
    document.getElementById('post-body').value = ''
    document.getElementById('post-parent-category').value = ''
    document.getElementById('post-category').innerHTML = '<option value="">Subcategory</option>'
  }

  async function submitPost() {
    const title = document.getElementById('post-title').value.trim()
    const body = document.getElementById('post-body').value.trim()
    const category_id = document.getElementById('post-category').value

    if (!title || !body || !category_id) { alert('Please fill in all fields including subcategory'); return; }
    if (title.length < 5) { alert('Title must be at least 5 characters'); return; }
    if (body.length < 10) { alert('Post must be at least 10 characters'); return; }

    const { error } = await db.from('posts').insert({
      title, body,
      category_id: parseInt(category_id),
      user_id: currentUser.id
    })

    if (error) { alert('Error posting. Are you logged in?'); return; }

    closeModal()
    loadPosts(currentCategoryId)
  }

  function timeAgo(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000
    if (diff < 60) return 'just now'
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`
    return `${Math.floor(diff/86400)}d ago`
  }

  initAuth()
  loadCategories()
  loadPosts()
</script>

</body>
</html>
