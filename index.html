<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The MBA Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: flex-end;
    }

    .btn-login {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #000;
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-login:hover { opacity: 0.5; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(64px, 10vw, 120px);
      font-weight: 900;
      color: #000000;
      line-height: 1.0;
      letter-spacing: -3px;
      text-align: center;
    }

    .btn-forum {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #fff;
      background: #000;
      border: none;
      border-radius: 6px;
      padding: 12px 28px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .btn-forum:hover { opacity: 0.7; }

    footer {
      border-top: 0.5px solid #e0e0e0;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    footer a {
      font-size: 11px;
      color: #999;
      text-decoration: none;
    }

    footer a:hover { color: #000; }
  </style>
</head>
<body>

  <nav>
    <a href="/login" class="btn-login">Log in</a>
  </nav>

  <main>
    <h1>The MBA Club</h1>
    <a href="/forum.html" class="btn-forum">Enter the forum →</a>
  </main>

  <footer>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  (async () => {
    const { data: { session } } = await db.auth.getSession()
    if (session) {
      document.querySelector('nav').innerHTML = `
        <div style="position:relative" id="profile-menu">
          <button onclick="toggleMenu()" style="font-family:Inter,sans-serif;font-size:12px;color:#000;background:rgba(255,255,255,0.85);border:0.5px solid #000;border-radius:6px;padding:7px 18px;cursor:pointer;">Profile</button>
          <div id="profile-dropdown" style="display:none;position:absolute;right:0;top:calc(100% + 8px);background:#fff;border:0.5px solid #e0e0e0;border-radius:8px;padding:0.5rem;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,0.08);z-index:100;">
            <div style="font-size:11px;color:#999;padding:6px 10px;border-bottom:0.5px solid #f0f0f0;margin-bottom:4px;">${session.user.email}</div>
            <a href="profile.html" style="display:block;font-size:12px;color:#000;text-decoration:none;padding:7px 10px;border-radius:5px;">My profile</a>
            <button onclick="logout()" style="display:block;width:100%;text-align:left;font-family:Inter,sans-serif;font-size:12px;color:#000;background:transparent;border:none;padding:7px 10px;border-radius:5px;cursor:pointer;">Log out</button>
          </div>
        </div>
      `
    }
  })()

  function toggleMenu() {
    const d = document.getElementById('profile-dropdown')
    d.style.display = d.style.display === 'none' ? 'block' : 'none'
  }

  async function logout() {
    await db.auth.signOut()
    window.location.reload()
  }
</script>

</body>
</html>
