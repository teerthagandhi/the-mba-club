<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The MBA Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      background-image:
        linear-gradient(rgba(107,31,31,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(107,31,31,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: flex-end;
    }

    .btn-login {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #000;
      background: rgba(255,255,255,0.85);
      border: 0.5px solid #000;
      border-radius: 6px;
      padding: 7px 18px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-login:hover { opacity: 0.6; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 3rem;
      gap: 2rem;
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(64px, 10vw, 110px);
      font-weight: 900;
      color: #000;
      line-height: 1.0;
      letter-spacing: -3px;
    }

    h1 span { color: #6B1F1F; }

    .btn-forum {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #6B1F1F;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.03em;
      border: none;
      border-radius: 6px;
      padding: 11px 24px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-forum:hover { opacity: 0.8; }

    .corner-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6B1F1F;
      opacity: 0.3;
    }

    .dot-tl { top: 32px; left: 32px; }
    .dot-tr { top: 32px; right: 32px; }
    .dot-bl { bottom: 48px; left: 32px; }
    .dot-br { bottom: 48px; right: 32px; }

    footer {
      border-top: 0.5px solid rgba(0,0,0,0.08);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.6);
    }

    .footer-links { display: flex; gap: 1.5rem; }

    .footer-links a {
      font-size: 11px;
      color: #999;
      text-decoration: none;
    }

    .footer-links a:hover { color: #6B1F1F; }

    .footer-right { font-size: 11px; color: #bbb; }

    @media (max-width: 600px) {
      h1 { font-size: 52px; letter-spacing: -2px; }
    }
  </style>
</head>
<body>

  <div class="corner-dot dot-tl"></div>
  <div class="corner-dot dot-tr"></div>
  <div class="corner-dot dot-bl"></div>
  <div class="corner-dot dot-br"></div>

  <nav>
    <a href="login.html" class="btn-login">Log in</a>
  </nav>

  <main>
    <h1>The <span>MBA</span> Club</h1>
    <a href="forum.html" class="btn-forum">Enter the forum →</a>
  </main>

  <footer>
    <div class="footer-links">
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="privacy.html">Privacy</a>
    </div>
    <span class="footer-right">The MBA Club · 2025</span>
  </footer>

</body>
</html>
