<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — The MBA Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      border-bottom: 0.5px solid #e0e0e0;
      padding: 1rem 2rem;
    }

    .nav-logo {
      font-weight: 900;
      font-size: 16px;
      text-decoration: none;
      color: #000;
      letter-spacing: -0.5px;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 380px;
      padding: 2rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 13px;
      color: #999;
      margin-bottom: 2rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 0.5px solid #e0e0e0;
    }

    .tab {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #999;
      background: transparent;
      border: none;
      padding: 8px 0;
      margin-right: 1.5rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
    }

    .tab.active {
      color: #000;
      border-bottom-color: #000;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .form input {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      border: 0.5px solid #ccc;
      border-radius: 6px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      color: #000;
    }

    .form input:focus { border-color: #000; }

    .btn-submit {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 11px;
      cursor: pointer;
      width: 100%;
      margin-top: 0.5rem;
    }

    .btn-submit:hover { opacity: 0.7; }

    .message {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 1rem;
    }

    .message.error { color: red; }
    .message.success { color: green; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">The MBA Club</a>
  <a href="profile.html" class="btn-small">Profile</a>
</nav>

<main>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Log in or create your account</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Log in</button>
      <button class="tab" onclick="switchTab('signup')">Sign up</button>
    </div>

    <!-- LOGIN -->
    <div id="login-form" class="form">
      <input type="email" id="login-email" placeholder="Email" />
      <input type="password" id="login-password" placeholder="Password" />
      <button class="btn-submit" onclick="login()">Log in</button>
      <p class="message" id="login-msg"></p>
    </div>

    <!-- SIGNUP -->
    <div id="signup-form" class="form" style="display:none">
      <input type="text" id="signup-username" placeholder="Username" />
      <input type="email" id="signup-email" placeholder="Email" />
      <input type="password" id="signup-password" placeholder="Password" />
      <button class="btn-submit" onclick="signup()">Create account</button>
      <p class="message" id="signup-msg"></p>
    </div>
  </div>
</main>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    event.target.classList.add('active')
    document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none'
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'flex' : 'none'
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim()
    const password = document.getElementById('login-password').value
    const msg = document.getElementById('login-msg')

    const { error } = await db.auth.signInWithPassword({ email, password })

    if (error) {
      msg.textContent = error.message
      msg.className = 'message error'
    } else {
      window.location.href = 'forum.html'
    }
  }

  async function signup() {
    const username = document.getElementById('signup-username').value.trim()
    const email = document.getElementById('signup-email').value.trim()
    const password = document.getElementById('signup-password').value
    const msg = document.getElementById('signup-msg')

    if (!username || !email || !password) {
      msg.textContent = 'Please fill in all fields'
      msg.className = 'message error'
      return
    }

    const { data, error } = await db.auth.signUp({ email, password })

    if (error) {
      msg.textContent = error.message
      msg.className = 'message error'
      return
    }

    // Create profile
    await db.from('profiles').insert({
      id: data.user.id,
      username,
    })

    msg.textContent = 'Account created! Check your email to confirm.'
    msg.className = 'message success'
  }
</script>

</body>
</html>
